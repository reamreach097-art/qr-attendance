<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scan to check in</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background:#111; color:#fff; margin:0; height:100vh; display:flex;
         flex-direction:column; align-items:center; justify-content:center; gap:20px; }
  h1 { font-size:28px; font-weight:500; margin:0; }
  #qr { background:#fff; padding:24px; border-radius:16px; }
  p { color:#aaa; font-size:16px; margin:0; }
  #download-btn { position:fixed; bottom:20px; right:20px; padding:10px 16px;
                  border-radius:8px; border:1px solid #444; background:#222; color:#fff; cursor:pointer; }
</style>
</head>
<body>
  <h1>Scan to check in / out</h1>
  <div id="qr"></div>
  <p>Office attendance</p>
  <button id="download-btn" onclick="downloadQR()">Download PNG</button>

<script>
// Set this to the deployed URL of scan.html
const SCAN_PAGE_URL = 'https://yourusername.github.io/qr-attendance/scan.html';

new QRCode(document.getElementById('qr'), {
  text: SCAN_PAGE_URL,
  width: 320,
  height: 320,
  colorDark: '#000000',
  colorLight: '#ffffff'
});

function downloadQR(){
  const canvas = document.querySelector('#qr canvas');
  if(!canvas) return;
  const url = canvas.toDataURL('image/png');
  const a = document.createElement('a');
  a.href = url; a.download = 'office_attendance_qr.png';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
</script>
</body>
</html>
